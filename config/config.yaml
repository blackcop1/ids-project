# Configuration file for IDS Project

dataset:
  # Path to the dataset
  path: "data/UNSW-NB15_training-set.csv"
  # Test set ratio (0-1)
  test_size: 0.2
  # Random state for reproducibility
  random_state: 42
  # Whether to remove outliers
  remove_outliers: true

# Random Forest Configuration
random_forest:
  n_estimators: 100
  max_depth: 20
  min_samples_split: 10
  min_samples_leaf: 5
  random_state: 42
  n_jobs: -1

# XGBoost Configuration
xgboost:
  n_estimators: 100
  learning_rate: 0.1
  max_depth: 6
  subsample: 0.8
  colsample_bytree: 0.8
  random_state: 42
  tree_method: hist

# Neural Network Configuration
neural_network:
  epochs: 20
  batch_size: 32
  learning_rate: 0.001
  dropout_rate: 0.3
  early_stopping_patience: 5
  validation_split: 0.2

# Real-time Detection Configuration
detection:
  # Alert threshold (0-1)
  alert_threshold: 0.7
  # Network interface for sniffing (e.g., 'eth0', 'wlan0')
  interface: "eth0"
  # Log file path
  log_file: "logs/ids_alerts.log"
  # Number of packets to capture for training
  packet_sample_size: 10000

# Paths
paths:
  data: "data/"
  models: "models/"
  results: "results/"
  logs: "logs/"
  notebooks: "notebooks/"

# Logging Configuration
logging:
  level: "INFO"
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level: <8} | {name}:{function}:{line} - {message}"
  rotation: "500 MB"
  retention: "10 days"
